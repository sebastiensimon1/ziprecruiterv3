# fly.toml - ziprecruiterv3 on Fly.io
#
# RAM Breakdown for SeleniumBase UC Driver mode:
#   - Chrome browser process (UC mode):    ~500-700MB
#   - Chrome renderer + V8 JS engine:      ~300-500MB
#   - Per-card DOM interaction + waits:    ~200MB
#   - Python + Flask overhead:             ~150MB
#   - OS + headroom:                       ~250MB
#   ─────────────────────────────────────────────
#   Recommended for fast/snappy:           4096MB (4GB)
#
# CPU: performance-2x (2 dedicated vCPUs)
#   - UC Driver patches Chrome at startup (CPU burst)
#   - Card clicking + DOM waiting is CPU-bound
#   - Matches glassdoorv3 profile (same SeleniumBase UC usage)

app = 'ziprecruiterv3'
primary_region = 'iad'

[build]

[env]
  PORT = '8080'
  kill_signal = 'SIGINT'
  kill_timeout = '300s'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 3
    soft_limit = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '20s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'performance-2x'
  memory = '4096mb'
